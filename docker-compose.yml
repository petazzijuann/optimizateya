services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: optimizateya
      POSTGRES_PASSWORD: optimizateya
      POSTGRES_DB: optimizateya
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optimizateya"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
