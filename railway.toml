# Railway: 3 servicios sobre la misma imagen + Postgres(pgvector) + Redis managed.
# Crear los servicios apuntando a este repo y override del start command:
#   api       -> (default del Dockerfile)
#   worker    -> arq worker.main.WorkerSettings
#   scheduler -> python -m scheduler.engine

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

# Healthcheck SOLO en el servicio api (configurarlo en la UI: Settings → Deploy →
# Healthcheck Path = /health, Timeout = 120). No va acá porque este archivo aplica
# a los 3 servicios y worker/scheduler no sirven HTTP.
[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
